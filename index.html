<!DOCTYPE html>

<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <link rel="icon" href="icon.png">
    <title>██████ OS</title>
</head>

<body>
    <div id="body">
        <div class="icons">
            <img src="notesIcon.png" onclick="openWindow('notesWindow')">
            <img src="filesIcon.png" onclick="openWindow('folderWindow')">
        </div>

        <div id="notesWindow" class="window" style="visibility: hidden;">
            <div class="header" id="notesWindowheader"><img src="x.png" class="xButton" onclick="closeWindow('notesWindow')"></div><div class="windowContent">
                <p contenteditable="true" spellcheck="false"></p>
        </div></div>
        <div id="folderWindow" class="window" style="visibility: hidden;">
            <div class="header" id="folderWindowheader"><img src="back.png" class="backButton" onclick="closeFolder()"><img src="x.png" class="xButton" onclick="closeWindow('folderWindow')"></div><div class="windowContent" id="folderContent">
        </div></div>

        <div class="bottombar onTop" class="onTop"><p style="margin-right: 16px; vertical-align: center;" id="time">10:20 AM</p>
            <img src="notif.png" id="notifButton" onclick="toggleNotifs()">
        </div>
        <div class="notifs onTop" id="notifs">
            <div><p>Hello again!</p><p>This is a test notification!</p></div>
            <div><p>More test notifications</p></div>
        </div>
    </div>
</body>
</html>
